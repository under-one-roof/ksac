<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Users - UOR Admin</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <style> body { background-color: #F8FAFC; } .sidebar { width: 260px; height: 100vh; background: #0F172A; color: white; position: fixed; top:0; left:0; padding-top: 20px; overflow-y: auto; } .sidebar a { color: #94A3B8; text-decoration: none; display: block; padding: 15px 25px; font-weight: 600; transition: 0.3s; } .sidebar a:hover, .sidebar a.active { background: #1E293B; color: #F97316; border-left: 4px solid #F97316; } .main-content { margin-left: 260px; padding: 30px; } .stat-card { border-radius: 16px; border: none; box-shadow: 0 4px 20px rgba(0,0,0,0.05); } </style>
</head>
<body>
    <div class="sidebar">
        <h4 class="text-center mb-4 text-white">UOR Admin</h4>
        <a href="{{ url_for('admin_dashboard') }}"><i class="fas fa-home me-2"></i> Dashboard</a>
        <a href="{{ url_for('admin_products') }}"><i class="fas fa-box me-2"></i> Products</a>
        <a href="{{ url_for('admin_categories') }}"><i class="fas fa-tags me-2"></i> Categories</a>
        <a href="{{ url_for('admin_gallery') }}"><i class="fas fa-images me-2"></i> Gallery</a>
        <a href="{{ url_for('admin_testimonials') }}"><i class="fas fa-comment me-2"></i> Testimonials</a>
        <a href="{{ url_for('admin_users') }}" class="active"><i class="fas fa-users me-2"></i> Users</a>
        <a href="{{ url_for('admin_messages') }}"><i class="fas fa-envelope me-2"></i> Messages</a>
        <a href="{{ url_for('admin_settings') }}"><i class="fas fa-cog me-2"></i> Settings</a>
        <a href="{{ url_for('admin_logout') }}" style="position:absolute; bottom:20px; width:100%;"><i class="fas fa-sign-out-alt me-2"></i> Logout</a>
    </div>

    <div class="main-content">
        <h2 class="mb-4">System Users</h2>
        <div class="card stat-card p-4">
            <table class="table table-hover">
                <thead><tr><th>ID</th><th>Username</th><th>Role</th></tr></thead>
                <tbody>
                    {% for u in users %}
                    <tr><td>{{ u.id }}</td><td>{{ u.username }}</td><td><span class="badge bg-warning text-dark">{{ u.role }}</span></td></tr>
                    {% endfor %}
                </tbody>
            </table>
        </div>
    </div>
</body>
</html>

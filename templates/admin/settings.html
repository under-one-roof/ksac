<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Settings - UOR Admin</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <style>
        body { background-color: #F8FAFC; }
        .sidebar { width: 260px; height: 100vh; background: #0F172A; color: white; position: fixed; top:0; left:0; padding-top: 20px; overflow-y: auto; }
        .sidebar a { color: #94A3B8; text-decoration: none; display: block; padding: 15px 25px; font-weight: 600; transition: 0.3s; }
        .sidebar a:hover, .sidebar a.active { background: #1E293B; color: #F97316; border-left: 4px solid #F97316; }
        .main-content { margin-left: 260px; padding: 30px; }
        .stat-card { border-radius: 16px; border: none; box-shadow: 0 4px 20px rgba(0,0,0,0.05); }
    </style>
</head>
<body>
    <div class="sidebar">
        <h4 class="text-center mb-4 text-white">UOR Admin</h4>
        <a href="{{ url_for('admin_dashboard') }}"><i class="fas fa-home me-2"></i> Dashboard</a>
        <a href="{{ url_for('admin_products') }}"><i class="fas fa-box me-2"></i> Products</a>
        <a href="{{ url_for('admin_categories') }}"><i class="fas fa-tags me-2"></i> Categories</a>
        <a href="{{ url_for('admin_gallery') }}"><i class="fas fa-images me-2"></i> Gallery</a>
        <a href="{{ url_for('admin_testimonials') }}"><i class="fas fa-comment me-2"></i> Testimonials</a>
        <a href="{{ url_for('admin_users') }}"><i class="fas fa-users me-2"></i> Users</a>
        <a href="{{ url_for('admin_messages') }}"><i class="fas fa-envelope me-2"></i> Messages</a>
        <a href="{{ url_for('admin_settings') }}" class="active"><i class="fas fa-cog me-2"></i> Settings</a>
        <a href="{{ url_for('admin_logout') }}" style="position:absolute; bottom:20px; width:100%;"><i class="fas fa-sign-out-alt me-2"></i> Logout</a>
    </div>

    <div class="main-content">
        <h2 class="mb-4">System Settings</h2>
        <div class="card stat-card p-5 text-center">
            <i class="fas fa-tools fa-3x text-orange mb-3"></i>
            <h4>Halaman Pengaturan</h4>
            <p class="text-muted">Halaman ini dapat digunakan untuk mengatur konfigurasi website di masa depan (seperti nama perusahaan, logo, dll).</p>
            <button class="btn btn-secondary mt-3" disabled>Coming Soon</button>
        </div>
    </div>
</body>
</html>
